<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeedDefend // Legal AI Scan Node</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Deed<span class="highlight">Defend</span></h1>
            <p class="subtitle">AI Consumer Advocate // Contract Trap Analysis Engine</p>
        </header>

        <main>
            <section class="input-panel">
                <textarea id="contractInput" placeholder="Paste the full text of your legal document here..."></textarea>
                <button id="scanBtn" onclick="processContractScan()">Analyze Document Structure</button>

<button id="scanBtn">Analyze Document Structure</button>
            </section>

            <div id="loadingSpinner" class="spinner hidden">
                <p>AI engine compiling clauses...</p>
            </div>

            <section id="resultsPanel" class="results-panel hidden">
                <div class="dashboard-header">
                    <div class="score-circle">
                        <span id="safetyScore">100</span>
                        <span class="score-label">SAFETY SCORE</span>
                    </div>
                    <div class="verdict-container">
                        <h2>Analysis Verdict</h2>
                        <p id="verdictText"></p>
                    </div>
                </div>

                <div class="matrix-grid">
                    <div class="matrix-card">
                        <h3>🔴 Severe Traps (<span id="highCount">0</span>)</h3>
                        <ul id="highRiskList"></ul>
                    </div>
                    <div class="matrix-card">
                        <h3>🟡 Unfavorable (<span id="mediumCount">0</span>)</h3>
                        <ul id="mediumRiskList"></ul>
                    </div>
                    <div class="matrix-card">
                        <h3>🟢 Standard Clauses (<span id="lowCount">0</span>)</h3>
                        <ul id="lowRiskList"></ul>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
